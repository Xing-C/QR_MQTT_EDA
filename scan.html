<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>扫码</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;text-align:center;padding:0 12px 0;background:#000;color:#fff;display:flex;flex-direction:column}
h2{font-size:16px;padding:10px 0 4px;flex-shrink:0}
.video-wrap{position:relative;width:100%;max-width:400px;margin:0 auto;flex-shrink:0}
video{width:100%;max-width:400px;max-height:60vh;border-radius:8px;display:block}
#r{margin:6px 0;padding:6px 8px;background:#1a1a2e;border-radius:6px;font-size:12px;word-break:break-all;min-height:24px;flex-shrink:0}
.ok{color:#4ade80}.wait{color:#94a3b8}
.status{color:#94a3b8;font-size:10px;margin:0 0 4px;flex-shrink:0}
button{background:#2563eb;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer;min-width:72px}
.btn-cancel{background:#6b7280}
.toolbar label{color:#94a3b8;font-size:11px}
.toolbar select{background:#1e1e2e;color:#fff;border:1px solid #444;border-radius:4px;padding:3px 4px;font-size:11px;outline:none}
.actions-wrap{flex:1;display:flex;align-items:flex-end;justify-content:center;padding:16px 0}
.actions{display:none;gap:16px}
</style>
</head>
<body>
<h2>扫码</h2>
<div class="video-wrap">
<video id="v" autoplay playsinline></video>
<canvas id="c" hidden></canvas>
</div>
<div id="r" class="wait">等待扫码...</div>
<div class="status" id="status">连接中...</div>
<div class="actions-wrap">
<div class="actions" id="actions">
<button id="btn-send">✓ 推送</button>
<button id="btn-cancel" class="btn-cancel">✕ 取消</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/zxing-wasm@3.1.0/dist/iife/reader/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mqtt@4.3.8/dist/mqtt.min.js"></script>
<script>
var params = new URLSearchParams(location.search);
var deviceId = params.get('id') || '';
var topic = 'scan/' + deviceId;
var ackTopic = 'scan/' + deviceId + '/ack';
var broker = 'wss://broker.emqx.io:8084/mqtt';
var lastData = '';
var scanTimer = null;
var paused = false;
var pendingMsgId = null;
var ackTimer = null;
var mqttReady = false;
var zxingReady = false;

function waitZxing() {
    if (typeof ZXingWASM !== 'undefined' && typeof ZXingWASM.readBarcodes === 'function') {
        Promise.resolve(ZXingWASM.prepareZXingModule ? ZXingWASM.prepareZXingModule() : true).then(function() {
            zxingReady = true;
            document.getElementById('status').textContent = '扫码引擎就绪';
            tryStart();
        }).catch(function(e) {
            document.getElementById('r').textContent = '扫码引擎加载失败: ' + e.message;
        });
        return;
    }
    setTimeout(waitZxing, 500);
}
waitZxing();

function tryStart() {
    if (zxingReady && mqttReady) startCamera();
}

var mqttClient = mqtt.connect(broker, { connectTimeout: 10000 });

var mqttTimeout = setTimeout(function() {
    if (!mqttReady) {
        document.getElementById('r').textContent = 'MQTT 连接超时，请检查网络后刷新页面';
        document.getElementById('status').textContent = '连接失败';
    }
}, 15000);
mqttClient.on('connect', function () {
    clearTimeout(mqttTimeout);
    mqttReady = true;
    document.getElementById('status').textContent = zxingReady ? '扫码中...' : 'MQTT 已连接';
    mqttClient.subscribe(ackTopic);
    tryStart();
});
mqttClient.on('error', function() {
    clearTimeout(mqttTimeout);
    if (!mqttReady) {
        document.getElementById('r').textContent = 'MQTT 连接失败，请刷新页面重试';
        document.getElementById('status').textContent = '连接失败';
    }
});
mqttClient.on('message', function(t, msg) {
    try {
        var m = JSON.parse(msg.toString());
        if (m.type === 'ACK' && m.msgId === pendingMsgId) {
            clearTimeout(ackTimer);
            pendingMsgId = null;
            var r = document.getElementById('r');
            document.getElementById('status').textContent = '已发送 ✓';
            document.getElementById('actions').style.display = 'none';
            r.className = 'ok';
            r.innerHTML = '推送成功 ✓';
            // 1.5 秒后恢复扫描（不重置 lastData，避免重复识别同一码）
            setTimeout(function() {
                paused = false;
                document.getElementById('v').style.opacity = '1';
                document.getElementById('status').textContent = '扫码中...';
                r.innerHTML = '等待扫码...';
                r.className = 'wait';
            }, 1500);
        }
    } catch(e) {}
});

// 从视频抓一帧交给 zxing-wasm 解码
function grabAndScan() {
    var v = document.getElementById('v');
    var c = document.getElementById('c');
    var ctx = c.getContext('2d');
    if (v.readyState < 2) return;
    c.width = Math.min(v.videoWidth, 320);
    c.height = Math.round(c.width * v.videoHeight / v.videoWidth);
    ctx.drawImage(v, 0, 0, c.width, c.height);
    var img = ctx.getImageData(0, 0, c.width, c.height);
    ZXingWASM.readBarcodes(img, { formats: ['QRCode', 'DataMatrix', 'Aztec', 'Code128', 'PDF417'], tryHarder: true }).then(function(res) {
        if (res.length > 0) onCodeFound(res[0].text);
    }).catch(function(err) {
        console.log('[ZXing]', err);
    });
}

function playBeep() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = 800;
        var gain = ctx.createGain();
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
    } catch (e) {}
}

function onCodeFound(codeData) {
    if (codeData === lastData) return;
    lastData = codeData;

    if (/\/scan\.html(\?|$)/.test(codeData)) {
        document.getElementById('status').textContent = '检测到新设备ID 已跳转';
        document.getElementById('r').innerHTML = '跳转中...';
        setTimeout(function() { window.location.href = codeData; }, 500);
        return;
    }

    playBeep();
    paused = true;
    document.getElementById('v').style.opacity = '0.3';
    var r = document.getElementById('r');
    r.className = 'ok';
    r.innerHTML = codeData;

    document.getElementById('btn-send').onclick = function() {
        if (deviceId) {
            pendingMsgId = 'm' + Date.now() + '' + Math.random().toString(36).substring(2, 6);
            mqttClient.publish(topic, JSON.stringify({ type: 'SCAN_RESULT', content: codeData, msgId: pendingMsgId }));
        }
        document.getElementById('status').textContent = '等待确认...';
        document.getElementById('actions').style.display = 'none';
        r.className = 'wait';
        r.innerHTML = '等待插件确认...';

        // 5秒超时未收到 ACK
        ackTimer = setTimeout(function() {
            pendingMsgId = null;
            document.getElementById('status').textContent = '推送失败';
            r.className = 'wait';
            r.innerHTML = '设备ID失效，请扫描重新生成的二维码';
            // 2 秒后恢复扫描
            setTimeout(function() {
                paused = false;
                lastData = '';
                document.getElementById('v').style.opacity = '1';
                document.getElementById('status').textContent = '扫码中...';
                r.innerHTML = '等待扫码...';
            }, 2000);
        }, 5000);
    };

    document.getElementById('btn-cancel').onclick = function() {
        document.getElementById('actions').style.display = 'none';
        setTimeout(function() {
            paused = false;
            document.getElementById('v').style.opacity = '1';
            lastData = '';
            r.innerHTML = '等待扫码...';
        }, 500);
    };

    document.getElementById('actions').style.display = 'block';
}

function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 800 }, height: { ideal: 600 } } })
    .then(function(s) {
        var v = document.getElementById('v');
        v.srcObject = s;
        v.play();

        document.getElementById('status').textContent = '扫码中...';

        scanTimer = setInterval(function() {
            if (paused || v.readyState < 2) return;
            grabAndScan();
        }, 50);
    })
    .catch(function(e) {
        document.getElementById('r').textContent = '摄像头错误: ' + e.message;
        document.getElementById('status').textContent = '错误';
    });
}
</script>
</body>
</html>
